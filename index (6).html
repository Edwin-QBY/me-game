<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>🔮 簡易運勢占卜2</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; text-align: center; background-color: #fce4ec; padding-top: 50px; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #d81b60; }
        #result { font-size: 2em; margin: 30px 0; color: #880e4f; min-height: 1.2em; font-weight: bold; }
        button { background-color: #ec407a; color: white; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #d81b60; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="box">
    <h1>🔮 今日運勢占卜</h1>
    <div id="result">點擊下方按鈕，看看你的運勢</div>
    <button onclick="drawFortune()">點我占卜</button>
</div>

<script>
    const fortunes = [
        "✨大吉！",
        "中吉",
        "小吉",
        "吉",
        "末吉",
        "凶",
        "大凶！"
    ];

    function drawFortune() {
        const result = document.getElementById('result');
        result.innerText = "🌀 正在感知命運中...";
        
        
        setTimeout(() => {
            const index = Math.floor(Math.random() * fortunes.length);
            result.innerText = fortunes[index];
        }, 500);
    }
</script>


    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資模擬器 v2.0</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f2f5; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 600px; text-align: center; }
        canvas { border: 2px solid #eee; background: #fafafa; margin: 20px 0; border-radius: 8px; width: 100%; height: 250px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 8px; border-left: 5px solid #3498db; }
        .stat-card.highlight { border-left-color: #f1c40f; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; transition: all 0.2s; }
        .btn-next { background-color: #3498db; color: white; }
        .btn-buy { background-color: #2ecc71; color: white; }
        .btn-sell { background-color: #e74c3c; color: white; }
        button:active { transform: scale(0.95); }
        button:hover { opacity: 0.9; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .log-box { background: #333; color: #00ff00; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 13px; margin-top: 20px; text-align: left; height: 40px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <h2>📈 投資模擬器</h2>
    
    <div class="stats-grid">
        <div class="stat-card">持有現金: <br><strong>$<span id="cash">10000</span></strong></div>
        <div class="stat-card">持有股數: <br><strong><span id="shares">0</span> 股</strong></div>
        <div class="stat-card highlight">目前幣值: <br><strong>$<span id="current-price">100.00</span></strong></div>
        <div class="stat-card highlight">總資產: <br><strong>$<span id="total-wealth">10000.00</span></strong></div>
    </div>

    <canvas id="chart"></canvas>

    <div class="controls">
        <button class="btn-next" onclick="nextDay()">下一天</button>
        <button class="btn-buy" onclick="buyStock()">全部買入</button>
        <button class="btn-sell" onclick="sellStock()">全部賣出</button>
    </div>
    
    <div class="log-box" id="message">> 系統準備就緒，請按下一天開始。</div>
</div>

<script>
    let cash = 10000;
    let shares = 0;
    let priceHistory = [100, 102]; // 預設兩個點避免計算錯誤
    let day = 1;

    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');

    // 讓 Canvas 大小符合顯示尺寸
    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        drawChart();
    }

    function updateUI() {
        const currentPrice = priceHistory[priceHistory.length - 1];
        document.getElementById('cash').innerText = cash.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('shares').innerText = shares;
        document.getElementById('current-price').innerText = currentPrice.toFixed(2);
        const total = cash + (shares * currentPrice);
        document.getElementById('total-wealth').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        drawChart();
    }

    function nextDay() {
        day++;
        const lastPrice = priceHistory[priceHistory.length - 1];
        // 隨機波動 (-8% ~ +10%)
        const change = (Math.random() * 0.18) - 0.08;
        const newPrice = Math.max(1, lastPrice * (1 + change));
        
        priceHistory.push(newPrice);
        if (priceHistory.length > 40) priceHistory.shift();

        document.getElementById('message').innerText = > 第 ${day} 天：市場價格更新為 $${newPrice.toFixed(2)};
        updateUI();
    }

    function buyStock() {
        const price = priceHistory[priceHistory.length - 1];
        if (cash >= price) {
            let canBuy = Math.floor(cash / price);
            shares += canBuy;
            cash -= canBuy * price;
            document.getElementById('message').innerText = > 交易成功：買入 ${canBuy} 股;
            updateUI();
        }
    }

    function sellStock() {
        if (shares > 0) {
            const price = priceHistory[priceHistory.length - 1];
            const amount = shares * price;
            cash += amount;
            document.getElementById('message').innerText = > 交易成功：賣出所得 $${amount.toFixed(2)};
            shares = 0;
            updateUI();
        }
    }

    function drawChart() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const padding = 20;
        const drawW = canvas.width - (padding * 2);
        const drawH = canvas.height - (padding * 2);
        
        const maxP = Math.max(...priceHistory) * 1.1;
        const minP = Math.min(...priceHistory) * 0.9;
        const range = maxP - minP;

        ctx.beginPath();
        ctx.strokeStyle = '#3498db';
        ctx.lineWidth = 4;
        ctx.lineJoin = 'round';

        priceHistory.forEach((p, i) => {
            const x = padding + (i * (drawW / (priceHistory.length - 1)));
            const y = canvas.height - padding - ((p - minP) / range * drawH);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    // 初始化
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    updateUI();
</script>

</body>
</html>
