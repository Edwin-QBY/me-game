<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資模擬器 - V2</title>
    <style>
        :root { --up: #22c55e; --down: #ef4444; --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; width: 100%; max-width: 420px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 登入遮罩 */
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; width: 80%; max-width: 300px; border: 1px solid var(--blue); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; font-size: 16px; background: #0a101e; color: white; }
        
        /* 價格顯示 */
        .price-row { display: flex; justify-content: center; align-items: baseline; gap: 10px; margin: 10px 0; }
        #stock-price { font-size: 40px; font-weight: 800; color: white; }
        #stock-percent { font-size: 20px; font-weight: bold; }
        canvas { width: 100%; height: 160px; background: #000; border-radius: 12px; margin: 10px 0; border: 1px solid #334155; }

        /* 排行榜 */
        #leaderboard { background: #0a101e; border-radius: 12px; padding: 12px; margin-top: 20px; text-align: left; border: 1px solid #334155; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 14px; }
        
        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-next { width: 100%; padding: 16px; background: var(--blue); color: #0f172a; font-size: 18px; margin-bottom: 10px; }
        .trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .col { display: flex; flex-direction: column; gap: 8px; }
        .btn-buy { background: var(--up); padding: 10px; }
        .btn-sell { background: var(--down); padding: 10px; }
        .up { color: var(--up); } .down { color: var(--down); }
    </style>
</head>
<body>

    <!-- 登入介面 -->
    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="color:var(--blue);">🎮 市場連線中</h2>
            <p style="font-size: 14px; color: #94a3b8;">輸入暱稱開始雲端冒險</p>
            <input type="text" id="username-input" placeholder="您的名稱...">
            <button class="btn-next" onclick="login()">登入遊戲</button>
            <div id="login-status" style="font-size: 12px; color: #ef4444; margin-top: 10px;"></div>
        </div>
    </div>

    <!-- 遊戲介面 -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-bottom: 10px;">
            <span>👤 玩家: <b id="p-name" style="color:white;">---</b></span>
            <span>📅 DAY <b id="display-day" style="color:white;">1</b></span>
        </div>

        <div class="price-row">
            <div id="stock-price">$100.00</div>
            <div id="stock-percent">+0.00%</div>
        </div>
        
        <canvas id="game-chart"></canvas>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <div style="background: #334155; padding: 10px; border-radius: 10px;">現金: $<span id="display-cash">1000</span></div>
            <div style="background: #334155; padding: 10px; border-radius: 10px;">持股: <span id="display-shares">0</span></div>
        </div>

        <button class="btn-next" onclick="nextDay()">⏩ 前往下一天</button>

        <div class="trade-grid">
            <div class="col">
                <div style="font-size:12px; color:var(--up); font-weight:bold;">買入 (BUY)</div>
                <button class="btn-buy" onclick="trade('buy', 1)">1股</button>
                <button class="btn-buy" onclick="trade('buy', 10)">10股</button>
                <button class="btn-buy" onclick="trade('buy', 'all')">全倉</button>
            </div>
            <div class="col">
                <div style="font-size:12px; color:var(--down); font-weight:bold;">賣出 (SELL)</div>
                <button class="btn-sell" onclick="trade('sell', 1)">1股</button>
                <button class="btn-sell" onclick="trade('sell', 10)">10股</button>
                <button class="btn-sell" onclick="trade('sell', 'all')">清空</button>
            </div>
        </div>

        <!-- 排行榜 -->
        <div id="leaderboard">
            <div style="font-size: 12px; color: var(--blue); margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 5px;">🏆 全服財富排行榜</div>
            <div id="rank-list">正在讀取雲端數據...</div>
        </div>
    </div>

    <!-- Firebase SDK (使用您最新的代碼) -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://gstatic.com";

        // 這是您剛剛拿到的新鑰匙
        const firebaseConfig = {
            apiKey: "AIzaSyB8jlZ8rYpb6AQuqw5WQtYoRq2PKYMmXAU",
            authDomain: "mygame-5ef71.firebaseapp.com",
            projectId: "mygame-5ef71",
            storageBucket: "mygame-5ef71.firebasestorage.app",
            messagingSenderId: "776634078002",
            appId: "1:776634078002:web:b9bd8e6ee9d8be52157d2b"
        };

        // 初始化 Firebase
        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase 初始化失敗", e);
        }

        // 遊戲狀態
        let g = { name: "", cash: 1000, shares: 0, day: 1, price: 100, lastPrice: 100, history: [100] };

        // 登入功能
        window.login = async function() {
            const name = document.getElementById('username-input').value.trim();
            if (name.length < 2) return alert("暱稱至少要2個字");
            
            const btn = document.querySelector('#auth-overlay button');
            btn.innerText = "讀取存檔中...";
            btn.disabled = true;

            try {
                const userRef = doc(db, "players", name);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    g = {
                        name: data.name,
                        cash: data.cash || 1000,
                        shares: data.shares || 0,
                        day: data.day || 1,
                        price: data.price || 100,
                        lastPrice: data.lastPrice || 100,
                        history: data.history || [100]
                    };
                } else {
                    g.name = name;
                    await syncCloud(); // 建立新玩家
                }
                
                document.getElementById('auth-overlay').style.display = "none";
                document.getElementById('p-name').innerText = g.name;
                refreshUI();
                startLeaderboard();
            } catch (err) {
                console.error(err);
                document.getElementById('login-status').innerText = "連線失敗：請確保已開啟 Firestore 測試模式";
                btn.innerText = "重試";
                btn.disabled = false;
            }
        };

        // 雲端同步
        async function syncCloud() {
            if (!g.name || !db) return;
            try {
                const total = g.cash + (g.shares * g.price);
                await setDoc(doc(db, "players", g.name), {
                    ...g,
                    totalAsset: total,
                    lastUpdate: Date.now()
                });
            } catch(e) { console.error("同步失敗", e); }
        }

        // 排行榜監聽
        function startLeaderboard() {
            const q = query(collection(db, "players"), orderBy("totalAsset", "desc"), limit(8));
            onSnapshot(q, (snapshot) => {
                const list = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isMe = data.name === g.name ? " (你)" : "";
                    list.push(`<div class="rank-item"><span>${data.name}${isMe}</span><b class="up">$${Math.floor(data.totalAsset)}</b></div>`);
                });
                document.getElementById('rank-list').innerHTML = list.length ? list.join('') : "尚無玩家數據";
            });
        }

        // 核心邏輯
        const canvas = document.getElementById('game-chart');
        const ctx = canvas.getContext('2d');

        window.nextDay = function() {
            g.day++;
            g.lastPrice = g.price;
            // 隨機波動
            const vol = (Math.random() * 0.28 - 0.14);
            const gravity = (100 - g.price) * 0.06 / 100;
            g.price *= (1 + vol + gravity);
            if (g.price < 5) g.price = 5;
            
            g.history.push(g.price);
            if (g.history.length > 25) g.history.shift();
            
            refreshUI();
            syncCloud();
        };

        window.trade = function(type, amt) {
            let qty = (amt === 'all') ? (type==='buy'?Math.floor(g.cash/g.price):g.shares) : amt;
            if (qty <= 0) return;

            if (type === 'buy' && g.cash >= qty * g.price) {
                g.cash -= qty * g.price; g.shares += qty;
            } else if (type === 'sell' && g.shares >= qty) {
                g.cash += qty * g.price; g.shares -= qty;
            } else {
                return alert("餘額或持股不足");
            }
            refreshUI();
            syncCloud();
        };

        function refreshUI() {
            document.getElementById('stock-price').innerText = "$" + g.price.toFixed(2);
            document.getElementById('display-cash').innerText = Math.floor(g.cash);
            document.getElementById('display-shares').innerText = g.shares;
            document.getElementById('display-day').innerText = g.day;
            
            const diff = ((g.price - g.lastPrice)/g.lastPrice*100);
            const pEl = document.getElementById('stock-percent');
            pEl.innerText = (diff>=0?"+":"")+diff.toFixed(2)+"%";
            pEl.className = diff>=0?"up":"down";
            drawChart(diff>=0);
        }

        function drawChart(isUp) {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            const pad = 25; const max = Math.max(...g.history)*1.1; const min = Math.min(...g.history)*0.9;
            const range = (max - min) || 1;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.beginPath(); ctx.strokeStyle = isUp?"#22c55e":"#ef4444"; ctx.lineWidth = 3;
            g.history.forEach((p, i) => {
                const x = (i/(g.history.length-1))*(canvas.width-pad*2)+pad;
                const y = canvas.height-((p-min)/range*(canvas.height-pad*2)+pad);
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            });
            ctx.stroke();
        }
    </script>
</body>
</html>
