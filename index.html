<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資模擬器 - 聯網正式版</title>
    <!-- 載入 Firebase 核心 -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --up: #22c55e; --down: #ef4444; --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; width: 100%; max-width: 420px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--blue); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; background: #0a101e; color: white; box-sizing: border-box; }
        canvas { width: 100%; height: 140px; background: #000; border-radius: 12px; margin: 10px 0; border: 1px solid #334155; }
        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; padding: 12px; }
        .btn-next { width: 100%; background: var(--blue); color: #0f172a; font-size: 18px; margin-bottom: 10px; }
        .btn-trade { background: var(--up); width: 100%; padding: 10px; }
        #rank-list { text-align: left; font-size: 13px; background: #0a101e; padding: 10px; border-radius: 10px; margin-top: 15px; }
        .rank-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div id="auth-overlay"><div class="auth-box"><h2>📈 投資模擬器</h2><input type="text" id="username-input" placeholder="輸入暱稱..."><button class="btn-next" onclick="login()">開始獲利</button></div></div>
    <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#94a3b8;"><span>玩家: <b id="p-name">---</b></span><span>DAY <b id="display-day">1</b></span></div>
        <div style="font-size:32px; font-weight:bold; margin:10px 0;">$<span id="stock-price">100.00</span></div>
        <canvas id="game-chart"></canvas>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
            <div style="background:#334155; padding:8px; border-radius:8px;">現金: $<span id="display-cash">1000</span></div>
            <div style="background:#334155; padding:8px; border-radius:8px;">持股: <span id="display-shares">0</span></div>
        </div>
        <button class="btn-next" onclick="nextDay()">⏩ 進入下一天</button>
        <button class="btn-trade" onclick="trade()">全倉買入 / 賣出</button>
        <div id="rank-list">🏆 排行榜載入中...</div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB8jlZ8rYpb6AQuqw5WQtYoRq2PKYMmXAU",
        authDomain: "://firebaseapp.com",
        projectId: "mygame-5ef71",
        storageBucket: "mygame-5ef71.firebasestorage.app",
        messagingSenderId: "776634078002",
        appId: "1:776634078002:web:b9bd8e6ee9d8be52157d2b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let g = { name: "", cash: 1000, shares: 0, day: 1, price: 100, lastPrice: 100, history: [100] };

    window.login = async function() {
        const name = document.getElementById('username-input').value.trim();
        if (name.length < 2) return alert("暱稱太短");
        g.name = name;
        try {
            const doc = await db.collection("players").doc(g.name).get();
            if (doc.exists) g = Object.assign(g, doc.data());
            document.getElementById('auth-overlay').style.display = "none";
            document.getElementById('p-name').innerText = g.name;
            refreshUI();
            startLeaderboard();
        } catch (e) { alert("連線失敗，請檢查資料庫規則"); }
    };

    async function sync() {
        if (!g.name) return;
        const total = g.cash + (g.shares * g.price);
        await db.collection("players").doc(g.name).set({ ...g, totalAsset: total });
    }

    function startLeaderboard() {
        db.collection("players").orderBy("totalAsset", "desc").limit(5).onSnapshot(snap => {
            if (snap.empty) { document.getElementById('rank-list').innerHTML = "目前尚無數據"; return; }
            let h = "🏆 全服財富榜：<br>";
            snap.forEach(d => { h += `<div class="rank-item"><span>${d.data().name}</span><b>$${Math.floor(d.data().totalAsset)}</b></div>`; });
            document.getElementById('rank-list').innerHTML = h;
        });
    }

    window.nextDay = function() {
        g.day++; g.lastPrice = g.price;
        g.price *= (1 + (Math.random()*0.28-0.14) + (100-g.price)*0.08/100);
        g.history.push(g.price); if(g.history.length>20) g.history.shift();
        refreshUI(); sync();
    };

    window.trade = function() {
        if (g.cash >= g.price) { let q = Math.floor(g.cash/g.price); g.cash -= q*g.price; g.shares += q; }
        else if (g.shares > 0) { g.cash += g.shares*g.price; g.shares = 0; }
        refreshUI(); sync();
    };

    function refreshUI() {
        document.getElementById('stock-price').innerText = g.price.toFixed(2);
        document.getElementById('display-cash').innerText = Math.floor(g.cash);
        document.getElementById('display-shares').innerText = g.shares;
        document.getElementById('display-day').innerText = g.day;
        draw();
    }

    function draw() {
        const c = document.getElementById('game-chart'); const t = c.getContext('2d');
        c.width = c.offsetWidth; c.height = c.offsetHeight;
        const max = Math.max(...g.history)*1.1, min = Math.min(...g.history)*0.9;
        t.clearRect(0,0,c.width,c.height); t.beginPath(); t.strokeStyle = "#38bdf8"; t.lineWidth = 3;
        g.history.forEach((p, i) => {
            const x = (i/(g.history.length-1))*(c.width-40)+20;
            const y = c.height-((p-min)/(max-min||1)*(c.height-40)+20);
            if(i===0) t.moveTo(x,y); else t.lineTo(x,y);
        });
        t.stroke();
    }
</script>
</body>
</html>
