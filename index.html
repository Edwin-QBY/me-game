<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資模擬器 - 雲端診斷版</title>

    <!-- Firebase v9+ (modular) SDKs via official Google-hosted CDN (gstatic). -->
    <!-- NOTE: Using type="module" so we can import the modular APIs. -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

        // --- 1. 配置與診斷 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB8jlZ8rYpb6AQuqw5WQtYoRq2PKYMmXAU",
            // FIX: authDomain must be like "<project-id>.firebaseapp.com"
            authDomain: "mygame-5ef71.firebaseapp.com",
            projectId: "mygame-5ef71",
            storageBucket: "mygame-5ef71.firebasestorage.app",
            messagingSenderId: "776634078002",
            appId: "1:776634078002:web:b9bd8e6ee9d8be52157d2b"
        };

        let db = null;
        let g = { name: "", cash: 1000, shares: 0, day: 1, price: 100, lastPrice: 100, history: [100] };

        function log(msg) {
            document.getElementById('debug-log').innerText += "\n> " + msg;
        }

        function refreshUI() {
            document.getElementById('stock-price').innerText = g.price.toFixed(2);
            document.getElementById('display-cash').innerText = Math.floor(g.cash);
            document.getElementById('display-shares').innerText = g.shares;
            document.getElementById('display-day').innerText = g.day;
            drawChart();
        }

        function drawChart() {
            const c = document.getElementById('game-chart');
            const t = c.getContext('2d');
            c.width = c.offsetWidth;
            c.height = c.offsetHeight;
            const max = Math.max(...g.history, 110) * 1.1;
            const min = Math.min(...g.history, 90) * 0.9;
            t.clearRect(0, 0, c.width, c.height);
            t.beginPath();
            t.strokeStyle = "#38bdf8";
            t.lineWidth = 3;
            g.history.forEach((p, i) => {
                const x = (i / (g.history.length - 1 || 1)) * (c.width - 40) + 20;
                const y = c.height - ((p - min) / (max - min || 1) * (c.height - 40) + 20);
                if (i === 0) t.moveTo(x, y);
                else t.lineTo(x, y);
            });
            t.stroke();
        }

        async function syncToCloud() {
            if (!db || !g.name) return;
            try {
                const total = g.cash + (g.shares * g.price);
                await setDoc(doc(db, "players", g.name), {
                    ...g,
                    totalAsset: total,
                    lastUpdate: Date.now()
                });
            } catch (e) {
                log("同步失敗: " + (e?.message || e));
            }
        }

        function startLeaderboard() {
            if (!db) return;
            const q = query(collection(db, "players"), orderBy("totalAsset", "desc"), limit(5));
            onSnapshot(q, (snap) => {
                let html = "🏆 排行榜：<br>";
                snap.forEach((d) => {
                    const data = d.data();
                    html += `<div style=\"display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #222;\">\n                                <span>$\{data.name}\</span><b>$<span>${Math.floor(data.totalAsset || 0)}</span></b>\n                             </div>`;
                });
                document.getElementById('rank-list').innerHTML = html;
            }, (err) => {
                log("排行讀取失敗: " + err.message);
            });
        }

        // 初始化
        window.onload = function () {
            log("檢查 Firebase 資源...");
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                log("Firebase 連結成功！");
                document.getElementById('status-msg').innerText = "雲端已就緒";
                document.getElementById('conn-icon').innerText = "● 雲端連線";
                document.getElementById('conn-icon').style.color = "#22c55e";
            } catch (e) {
                log("初始化失敗: " + e.message);
                document.getElementById('status-msg').innerText = "離線模式運行";
            }
        };

        // --- 2. 登入 ---
        window.startGame = async function () {
            const name = document.getElementById('username-input').value.trim();
            if (name.length < 2) return alert("暱稱太短");
            g.name = name;

            if (db) {
                log("正在與雲端同步玩家: " + g.name);
                try {
                    const ref = doc(db, "players", g.name);
                    const snap = await getDoc(ref);
                    if (snap.exists()) {
                        g = Object.assign(g, snap.data());
                        log("已找到雲端存檔");
                    } else {
                        log("建立新玩家數據");
                        await syncToCloud();
                    }
                    startLeaderboard();
                } catch (e) {
                    log("連線被資料庫擋住: " + e.message);
                }
            }

            document.getElementById('auth-overlay').style.display = "none";
            document.getElementById('player-display').innerText = "玩家: " + g.name;
            refreshUI();
        };

        // --- 3. 遊戲邏輯 ---
        window.handleNextDay = function () {
            g.day++;
            g.lastPrice = g.price;
            g.price *= (1 + (Math.random() * 0.28 - 0.14) + (100 - g.price) * 0.08 / 100);
            if (g.price < 5) g.price = 5;
            g.history.push(g.price);
            if (g.history.length > 20) g.history.shift();
            refreshUI();
            syncToCloud();
        };

        window.handleTrade = function () {
            if (g.cash >= g.price) {
                let q = Math.floor(g.cash / g.price);
                g.cash -= q * g.price;
                g.shares += q;
            } else if (g.shares > 0) {
                g.cash += g.shares * g.price;
                g.shares = 0;
            }
            refreshUI();
            syncToCloud();
        };
    </script>

    <style>
        :root { --up: #22c55e; --down: #ef4444; --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--blue); width: 85%; max-width: 300px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; background: #0a101e; color: white; box-sizing: border-box; outline: none; }
        canvas { width: 100%; height: 140px; background: #000; border-radius: 12px; margin: 10px 0; border: 1px solid #334155; }
        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.1s; padding: 12px; }
        .btn-next { width: 100%; background: var(--blue); color: #0f172a; font-size: 18px; margin-bottom: 10px; }
        #debug-log { font-size: 10px; color: #64748b; margin-top: 10px; text-align: left; background: #000; padding: 5px; border-radius: 5px; max-height: 60px; overflow: auto; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="color:var(--blue);">🎮 市場連線中</h2>
            <input type="text" id="username-input" placeholder="輸入暱稱..."><button class="btn-next" id="login-btn" onclick="startGame()">登入遊戲</button>
            <div id="status-msg" style="color: #94a3b8; font-size: 12px; margin-top: 10px;">系統初始化中...</div>
            <div id="debug-log">Debug: 等待指令</div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#94a3b8;">
            <span id="conn-icon" style="color: #ef4444;">● 離線</span>
            <span id="player-display">玩家: ---</span>
            <span>DAY <b id="display-day">1</b></span>
        </div>
        <div style="font-size:32px; font-weight:bold; margin:10px 0;">$<span id="stock-price">100.00</span></div>
        <canvas id="game-chart"></canvas>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <div style="background:#334155; padding:8px; border-radius:8px;">現金: $<span id="display-cash">1000</span></div>
            <div style="background:#334155; padding:8px; border-radius:8px;">持股: <span id="display-shares">0</span></div>
        </div>
        <button class="btn-next" onclick="handleNextDay()">⏩ 進入下一天</button>
        <button style="background:var(--up); width:100%; padding:10px; border-radius:8px;" onclick="handleTrade()">全倉交易 (買/賣)</button>
        <div id="rank-list" style="text-align:left; font-size:12px; margin-top:15px; background:#0a101e; padding:10px; border-radius:10px;">🏆 排行榜載入中...</div>
    </div>

</body>
</html>
