<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>🔮 簡易運勢占卜2</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; text-align: center; background-color: #fce4ec; padding-top: 50px; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #d81b60; }
        #result { font-size: 2em; margin: 30px 0; color: #880e4f; min-height: 1.2em; font-weight: bold; }
        button { background-color: #ec407a; color: white; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #d81b60; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="box">
    <h1>🔮 今日運勢占卜</h1>
    <div id="result">點擊下方按鈕，看看你的運勢</div>
    <button onclick="drawFortune()">點我占卜</button>
</div>

<script>
    const fortunes = [
        "✨大吉！",
        "中吉",
        "小吉",
        "吉",
        "末吉",
        "凶",
        "大凶！"
    ];

    function drawFortune() {
        const result = document.getElementById('result');
        result.innerText = "🌀 正在感知命運中...";
        
        
        setTimeout(() => {
            const index = Math.floor(Math.random() * fortunes.length);
            result.innerText = fortunes[index];
        }, 500);
    }
</script>

</body>
</html>
