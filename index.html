<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資模擬器 - V2</title>

    <!-- 1. 載入 Firebase 核心庫 (使用 www.gstatic 完整網址避免 CORS 錯誤) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --up: #22c55e; --down: #ef4444; --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 20px; width: 100%; max-width: 420px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; max-width: 300px; border: 2px solid var(--blue); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; font-size: 16px; background: #0a101e; color: white; box-sizing: border-box; outline: none; }
        
        .price-row { display: flex; justify-content: center; align-items: baseline; gap: 10px; margin: 10px 0; }
        #stock-price { font-size: 36px; font-weight: bold; }
        #stock-percent { font-size: 18px; }
        
        canvas { width: 100%; height: 150px; background: #000; border-radius: 12px; margin: 10px 0; border: 1px solid #334155; }
        
        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.1s; padding: 12px; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        
        .btn-next { width: 100%; padding: 15px; background: var(--blue); color: #0f172a; font-size: 18px; margin-bottom: 10px; }
        .btn-buy { background: var(--up); }
        .btn-sell { background: var(--down); }
        .up { color: var(--up); } .down { color: var(--down); }

        #leaderboard { background: #0a101e; border-radius: 12px; padding: 10px; margin-top: 15px; text-align: left; }
        .rank-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; font-size: 13px; }
    </style>
</head>
<body>

    <!-- 登入介面 -->
    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="color:var(--blue); margin: 0 0 10px 0;">🎮 聯網模擬器</h2>
            <p style="font-size: 14px; color: #94a3b8;">請輸入名稱以開始連線</p>
            <input type="text" id="username-input" placeholder="您的名稱...">
            <button class="btn-next" id="login-btn" onclick="window.doLogin()">登入遊戲</button>
            <div id="status-msg" style="font-size: 12px; color: #ef4444; margin-top: 10px;"></div>
        </div>
    </div>

    <!-- 遊戲主體 -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8;">
            <span>玩家: <b id="p-name">---</b></span>
            <span>DAY <b id="display-day">1</b></span>
        </div>
        <div class="price-row">
            <div id="stock-price">$100.00</div>
            <div id="stock-percent">+0.00%</div>
        </div>
        <canvas id="game-chart"></canvas>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <div style="background: #334155; padding: 10px; border-radius: 10px;">現金: $<span id="display-cash">1000</span></div>
            <div style="background: #334155; padding: 10px; border-radius: 10px;">持股: <span id="display-shares">0</span></div>
        </div>
        <button class="btn-next" onclick="window.doNextDay()">⏩ 前往下一天</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-buy" onclick="window.doTrade('buy')">全倉買入</button>
            <button class="btn-sell" onclick="window.doTrade('sell')">全倉賣出</button>
        </div>
        <div id="leaderboard">
            <div style="font-size: 12px; color: var(--blue); margin-bottom: 5px; font-weight: bold; border-bottom: 1px solid #334155;">🏆 排行榜</div>
            <div id="rank-list">讀取中...</div>
        </div>
    </div>

    <script>
        // --- 1. 配置與初始化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB8jlZ8rYpb6AQuqw5WQtYoRq2PKYMmXAU",
            authDomain: "://firebaseapp.com",
            projectId: "mygame-5ef71",
            storageBucket: "mygame-5ef71.firebasestorage.app",
            messagingSenderId: "776634078002",
            appId: "1:776634078002:web:b9bd8e6ee9d8be52157d2b"
        };

        var db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch (e) {
            console.error("Firebase 初始化失敗", e);
        }

        var g = { name: "", cash: 1000, shares: 0, day: 1, price: 100, lastPrice: 100, history: [100] };

        // --- 2. 遊戲核心函數 ---
        window.doLogin = async function() {
            const name = document.getElementById('username-input').value.trim();
            if (name.length < 2) return alert("名稱至少需要兩個字");
            
            const btn = document.getElementById('login-btn');
            btn.innerText = "連線中...";
            btn.disabled = true;

            try {
                const userRef = db.collection("players").doc(name);
                const doc = await userRef.get();
                if (doc.exists) {
                    g = Object.assign(g, doc.data());
                } else {
                    g.name = name;
                    await syncCloud();
                }
                document.getElementById('auth-overlay').style.display = "none";
                document.getElementById('p-name').innerText = g.name;
                refreshUI();
                startLeaderboard();
            } catch (err) {
                document.getElementById('status-msg').innerText = "連線失敗：請確保已開啟 Firestore 測試模式並發佈規則。";
                btn.innerText = "登入遊戲";
                btn.disabled = false;
                console.error(err);
            }
        };

        async function syncCloud() {
            if (!g.name) return;
            const total = g.cash + (g.shares * g.price);
            await db.collection("players").doc(g.name).set({
                ...g,
                totalAsset: total,
                lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function startLeaderboard() {
            db.collection("players").orderBy("totalAsset", "desc").limit(5).onSnapshot(snap => {
                let html = "";
                snap.forEach(d => {
                    const data = d.data();
                    html += `<div class="rank-item"><span>${data.name}</span><b class="up">$${Math.floor(data.totalAsset)}</b></div>`;
                });
                document.getElementById('rank-list').innerHTML = html;
            });
        }

        window.doNextDay = function() {
            g.day++;
            g.lastPrice = g.price;
            const vol = (Math.random() * 0.3 - 0.15);
            g.price *= (1 + vol + (100 - g.price) * 0.08 / 100);
            if (g.price < 5) g.price = 5;
            g.history.push(g.price);
            if (g.history.length > 20) g.history.shift();
            refreshUI();
            syncCloud();
        };

        window.doTrade = function(type) {
            const qty = (type === 'buy') ? Math.floor(g.cash / g.price) : g.shares;
            if (qty <= 0) return;
            if (type === 'buy') { g.cash -= qty * g.price; g.shares += qty; }
            else { g.cash += qty * g.price; g.shares -= qty; }
            refreshUI();
            syncCloud();
        };

        function refreshUI() {
            document.getElementById('stock-price').innerText = "$" + g.price.toFixed(2);
            document.getElementById('display-cash').innerText = Math.floor(g.cash);
            document.getElementById('display-shares').innerText = g.shares;
            document.getElementById('display-day').innerText = g.day;
            const diff = ((g.price - g.lastPrice) / g.lastPrice * 100);
            const pEl = document.getElementById('stock-percent');
            pEl.innerText = (diff >= 0 ? "+" : "") + diff.toFixed(2) + "%";
            pEl.className = diff >= 0 ? "up" : "down";
            drawChart(diff >= 0);
        }

        function drawChart(isUp) {
            const canvas = document.getElementById('game-chart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            const pad = 20;
            const max = Math.max(...g.history) * 1.1;
            const min = Math.min(...g.history) * 0.9;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.strokeStyle = isUp ? "#22c55e" : "#ef4444"; ctx.lineWidth = 3;
            g.history.forEach((p, i) => {
                const x = (i / (g.history.length - 1)) * (canvas.width - pad * 2) + pad;
                const y = canvas.height - ((p - min) / (max - min || 1) * (canvas.height - pad * 2) + pad);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }
    </script>
</body>
</html>
