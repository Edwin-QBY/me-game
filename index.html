<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資模擬器 - 安全強化版 V2.1</title>
    <style>
        :root { --up: #22c55e; --down: #ef4444; --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; width: 100%; max-width: 420px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--blue); width: 85%; max-width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #0a101e; color: white; box-sizing: border-box; outline: none; }
        
        .security-tip { font-size: 11px; color: #94a3b8; text-align: left; margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; border-left: 3px solid #f1c40f; }
        .security-tip b { color: #f1c40f; }

        .price-row { display: flex; justify-content: center; align-items: baseline; gap: 10px; margin: 5px 0; }
        #stock-price { font-size: 32px; font-weight: 800; }
        #stock-percent { font-size: 16px; font-weight: bold; }
        canvas { width: 100%; height: 150px; background: #000; border-radius: 12px; margin: 10px 0; border: 1px solid #334155; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-box { background: #334155; padding: 8px; border-radius: 10px; }
        .stat-label { font-size: 11px; color: #94a3b8; }
        .stat-val { font-size: 15px; font-weight: bold; }

        .trade-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .trade-col { display: flex; flex-direction: column; gap: 6px; }
        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.1s; color: white; padding: 10px; font-size: 13px; }
        .btn-next { width: 100%; background: var(--blue); color: #0f172a; font-size: 16px; margin-bottom: 10px; }
        .btn-buy { background: var(--up); }
        .btn-sell { background: var(--down); }
        .btn-reset { background: #475569; color: #cbd5e1; font-size: 11px; margin-top: 15px; width: 100%; opacity: 0.5; }

        .list-container { margin-top: 15px; text-align: left; background: #0a101e; border-radius: 10px; padding: 10px; border: 1px solid #334155; }
        .list-title { font-size: 11px; color: #64748b; margin-bottom: 5px; border-bottom: 1px solid #334155; padding-bottom: 3px; font-weight: bold; }
        .log-list { height: 100px; overflow-y: auto; font-size: 11px; font-family: monospace; }
        .log-item { border-bottom: 1px dashed #222; padding: 4px 0; color: #cbd5e1; }
        
        #debug-log { font-size: 10px; color: #64748b; margin-top: 10px; text-align: left; background: #000; padding: 5px; border-radius: 5px; max-height: 50px; overflow-y: auto; }
        .up { color: var(--up) !important; }
        .down { color: var(--down) !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="color:var(--blue); margin-top:0; margin-bottom:10px;">🎮 安全存取</h2>
            <input type="text" id="username-input" placeholder="輸入玩家暱稱">
            <input type="password" id="access-key-input" placeholder="輸入存取密鑰">
            
            <div class="security-tip">
                <b>⚠️ 安全提示：</b><br>
                數據將以加密模式同步至雲端。系統具備<b>反作弊監控</b>，任何異常數據將導致帳號被標記。
            </div>

            <button class="btn-next" style="margin-bottom:0;" onclick="startGame()">登入 / 註冊</button>
            <div id="status-msg" style="color: #94a3b8; font-size: 11px; margin-top: 10px;">安全環境檢測中...</div>
            <div id="debug-log">> 系統就緒</div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:11px; color:#94a3b8; margin-bottom: 5px;">
            <span id="conn-icon" style="color: #ef4444;">● 離線</span>
            <span id="player-display">玩家: ---</span>
            <span>DAY <b id="display-day">1</b></span>
        </div>

        <div class="price-row">
            <div id="stock-price">$100.00</div>
            <div id="stock-percent">+0.00%</div>
        </div>
        
        <canvas id="game-chart"></canvas>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">可用現金</div>
                <div class="stat-val">$<span id="display-cash">1000</span></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">持有股數</div>
                <div class="stat-val"><span id="display-shares">0</span></div>
            </div>
        </div>

        <button class="btn-next" onclick="handleNextDay()">⏩ 進入下一天</button>

        <div class="trade-panel">
            <div class="trade-col">
                <button class="btn-buy" onclick="handleTrade('buy', 1)">買 1</button>
                <button class="btn-buy" onclick="handleTrade('buy', 'all')">全買</button>
            </div>
            <div class="trade-col">
                <button class="btn-sell" onclick="handleTrade('sell', 1)">賣 1</button>
                <button class="btn-sell" onclick="handleTrade('sell', 'all')">全賣</button>
            </div>
        </div>

        <div class="list-container">
            <div class="list-title">📋 交易日誌 (Log)</div>
            <div id="log-list" class="log-list"></div>
        </div>

        <div class="list-container">
            <div class="list-title">🏆 財富排行</div>
            <div id="rank-list" class="log-list" style="height: 80px;">載入中...</div>
        </div>

        <button class="btn-reset" onclick="resetGameData()">⚠️ 重置進度</button>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB8jlZ8rYpb6AQuqw5WQtYoRq2PKYMmXAU",
    authDomain: "mygame-5ef71.firebaseapp.com",
    projectId: "mygame-5ef71",
    storageBucket: "mygame-5ef71.appspot.com",
    messagingSenderId: "776634078002",
    appId: "1:776634078002:web:b9bd8e6ee9d8be52157d2b"
  };

  let db = null;
  let isSuspected = false;
  let lastKnownCash = 1000; // 用於追蹤非法資金增加
  let g = { name: "", playerId: "", accessKey: "", cash: 1000, shares: 0, day: 1, price: 100, lastPrice: 100, history: [100], isCheater: false };

  function sysLog(msg) {
    const el = document.getElementById("debug-log");
    if(el) { el.innerText += "\n> " + msg; el.scrollTop = el.scrollHeight; }
  }

  // --- [核心反作弊監控] ---
  function checkSanity(newCash, isSellingAction = false) {
    // 1. 資金負數檢查
    if (newCash < 0 || g.shares < 0) return "負值數據異常";
    
    // 2. 新用戶暴富檢查 (第一天資產不應超過 2000，除非股價暴漲，給予一定寬限)
    if (g.day === 1 && (newCash + g.shares * g.price) > 3000) return "新帳號初始資金異常";

    // 3. 非法注資檢查：如果現金增加，但並非來自「賣出股票」動作
    if (newCash > lastKnownCash && !isSellingAction) {
        return "檢測到外部注入資金";
    }

    return null;
  }

  function markAsCheater(reason) {
    if (!isSuspected) {
        isSuspected = true;
        g.isCheater = true;
        alert(`⚠️ 安全警告：系統檢測到異常操作 (${reason})。你的帳號已被標記並列入監控名單。`);
        sysLog(`作弊標記: ${reason}`);
        syncToCloud();
    }
  }

  function addTradeLog(msg, type) {
    const list = document.getElementById("log-list");
    const item = document.createElement("div");
    item.className = "log-item";
    const color = type === 'buy' ? 'var(--up)' : 'var(--down)';
    item.innerHTML = `<span style="color:#64748b">[Day ${g.day}]</span> <span style="color:${color}">${msg}</span>`;
    list.prepend(item);
  }

  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    document.getElementById("status-msg").innerText = "加密防禦已啟動";
    document.getElementById("conn-icon").innerText = "● 安全連線";
    document.getElementById("conn-icon").style.color = "#22c55e";
  } catch (e) {
    sysLog("連線失敗");
  }

  window.startGame = async function () {
    const nameInput = document.getElementById("username-input").value.trim();
    const keyInput = document.getElementById("access-key-input").value.trim();
    
    if (nameInput.length < 2) return alert("暱稱需至少 2 個字");
    if (keyInput.length < 4) return alert("密鑰請至少設定 4 位數");

    g.name = nameInput;
    g.playerId = encodeURIComponent(nameInput).toLowerCase();
    g.accessKey = keyInput;

    if (db) {
      try {
        const ref = doc(db, "players", g.playerId);
        const snap = await getDoc(ref);
        
        if (snap.exists()) {
          const cloudData = snap.data();
          if (cloudData.accessKey !== g.accessKey) {
            return alert("暱稱已被佔用或密鑰錯誤！");
          }
          // 載入數據並清洗
          g.cash = Number(cloudData.cash) || 1000;
          g.shares = Number(cloudData.shares) || 0;
          g.day = Number(cloudData.day) || 1;
          g.isCheater = cloudData.isCheater || false;
          if (g.isCheater) isSuspected = true;
          lastKnownCash = g.cash;
        } else {
          await syncToCloud();
        }
        startLeaderboard();
      } catch (e) {
        sysLog("數據載入異常");
      }
    }
    document.getElementById("auth-overlay").style.display = "none";
    updatePlayerDisplay();
    refreshUI();
  };

  function updatePlayerDisplay() {
    const tag = isSuspected ? " <span style='color:red;'>(疑似作弊)</span>" : "";
    document.getElementById("player-display").innerHTML = "玩家: " + g.name + tag;
  }

  async function syncToCloud() {
    if (!db || !g.playerId) return;
    try {
      const total = g.cash + (g.shares * g.price);
      await setDoc(doc(db, "players", g.playerId), {
        ...g, 
        totalAsset: total, 
        lastUpdate: Date.now(),
        isCheater: isSuspected
      }, { merge: true });
    } catch (e) {}
  }

  function startLeaderboard() {
    const q = query(collection(db, "players"), orderBy("totalAsset", "desc"), limit(5));
    onSnapshot(q, (snap) => {
      let html = "";
      snap.forEach((d) => {
        const data = d.data();
        const cheatTag = data.isCheater ? " <small style='color:red;'>[疑]</small>" : "";
        html += `<div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #222;">
                  <span>${data.name}${cheatTag}</span><b>$${Math.floor(data.totalAsset || 0).toLocaleString()}</b>
                </div>`;
      });
      document.getElementById("rank-list").innerHTML = html || "暫無排行";
    });
  }

  window.handleNextDay = function () {
    g.day++;
    g.lastPrice = g.price;
    const change = (Math.random() * 0.28 - 0.14) + ((100 - g.price) * 0.08) / 100;
    g.price *= (1 + change);
    if (g.price < 5) g.price = 5;
    g.history.push(g.price);
    if (g.history.length > 20) g.history.shift();
    refreshUI();
    syncToCloud();
  };

  window.handleTrade = function (type, amount) {
    const price = g.price;
    if (type === 'buy') {
      let buyQty = (amount === 'all') ? Math.floor(g.cash / price) : amount;
      if (buyQty > 0 && g.cash >= buyQty * price) {
        g.cash -= buyQty * price;
        g.shares += buyQty;
        lastKnownCash = g.cash; // 正常減少現金，更新追蹤值
        addTradeLog(`買入 ${buyQty} 股 ($${price.toFixed(2)})`, 'buy');
      } else if (g.cash < price) {
        alert("資金不足！");
      }
    } else {
      let sellQty = (amount === 'all') ? g.shares : amount;
      if (sellQty > 0 && g.shares >= sellQty) {
        const income = sellQty * price;
        const error = checkSanity(g.cash + income, true); // 這是正常賣出
        if (error) { markAsCheater(error); }
        
        g.cash += income;
        g.shares -= sellQty;
        lastKnownCash = g.cash; // 正常增加現金，更新追蹤值
        addTradeLog(`賣出 ${sellQty} 股 ($${price.toFixed(2)})`, 'sell');
      } else if (g.shares <= 0) {
        alert("無持股可賣！");
      }
    }
    refreshUI();
    syncToCloud();
  };

  // 監控全局變數被篡改
  setInterval(() => {
    const error = checkSanity(g.cash, false);
    if (error) markAsCheater(error);
  }, 2000);

  window.resetGameData = async function() {
    if(!confirm("確定要重置嗎？")) return;
    g.cash = 1000; g.shares = 0; g.day = 1; g.price = 100; g.lastPrice = 100; g.history = [100];
    lastKnownCash = 1000;
    document.getElementById("log-list").innerHTML = "";
    await syncToCloud();
    refreshUI();
  };

  function refreshUI() {
    const priceEl = document.getElementById("stock-price");
    const percentEl = document.getElementById("stock-percent");
    priceEl.innerText = g.price.toFixed(2);
    document.getElementById("display-cash").innerText = Math.floor(g.cash).toLocaleString();
    document.getElementById("display-shares").innerText = g.shares;
    document.getElementById("display-day").innerText = g.day;
    updatePlayerDisplay();

    const diffPercent = ((g.price - g.lastPrice) / g.lastPrice) * 100;
    percentEl.innerText = (diffPercent >= 0 ? "+" : "") + diffPercent.toFixed(2) + "%";
    const status = diffPercent >= 0 ? "up" : "down";
    priceEl.className = status;
    percentEl.className = status;
    drawChart(status);
  }

  function drawChart(status) {
    const c = document.getElementById("game-chart");
    const t = c.getContext("2d");
    c.width = c.offsetWidth; c.height = c.offsetHeight;
    const max = Math.max(...g.history, 110) * 1.1;
    const min = Math.min(...g.history, 90) * 0.9;
    t.clearRect(0, 0, c.width, c.height);
    t.beginPath();
    t.strokeStyle = (status === "up") ? "#22c55e" : "#ef4444";
    t.lineWidth = 3; t.lineJoin = "round";
    g.history.forEach((p, i) => {
      const x = (i / (g.history.length - 1 || 1)) * (c.width - 40) + 20;
      const y = c.height - ((p - min) / (max - min || 1)) * (c.height - 40) - 20;
      if (i === 0) t.moveTo(x, y); else t.lineTo(x, y);
    });
    t.stroke();
  }
</script>
</body>
</html>
