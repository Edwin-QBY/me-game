<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資模擬器 - 安全防護最終版</title>
    <style>
        :root { --up: #22c55e; --down: #ef4444; --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; width: 100%; max-width: 420px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--blue); width: 85%; max-width: 320px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #0a101e; color: white; box-sizing: border-box; outline: none; }
        .btn-next { width: 100%; background: var(--blue); color: #0f172a; font-size: 16px; margin-bottom: 10px; padding: 12px; border-radius: 10px; border:none; font-weight:bold; cursor:pointer; }
        .trade-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; padding: 10px; font-size: 12px; }
        .btn-buy { background: var(--up); }
        .btn-sell { background: var(--down); }
        .btn-reset { background: #475569; font-size: 11px; margin-top: 15px; padding: 5px 10px; opacity: 0.7; border:none; border-radius:8px; color:white; cursor:pointer; }
        #stock-price { font-size: 32px; font-weight: 800; margin: 5px 0; }
        canvas { width: 100%; height: 100px; background: #000; border-radius: 10px; margin-bottom: 10px; }
        .list-container { margin-top: 10px; text-align: left; background: #0a101e; border-radius: 10px; padding: 10px; font-size: 12px; }
        .log-list { height: 70px; overflow-y: auto; }
        .up { color: var(--up); }
        .down { color: var(--down); }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="color:var(--blue); margin:0 0 10px 0;">🎮 帳號登入</h2>
            <input type="text" id="username-input" placeholder="輸入玩家暱稱">
            <input type="password" id="password-input" placeholder="輸入存檔密碼">
            <button class="btn-next" id="start-btn">進入遊戲</button>
            <p style="font-size:10px; color:#94a3b8;">同名玩家需輸入正確密碼</p>
            <p style="font-size:10px; color:#ef4444; margin-top:8px;">⚠️ 提醒：請勿使用重要密碼。</p>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#94a3b8;">
            <span id="player-display">玩家: ---</span>
            <span>DAY <b id="display-day">1</b></span>
        </div>

        <div id="stock-price">$100.00</div>
        <div id="stock-percent" style="font-weight:bold; margin-bottom:5px;">+0.00%</div>
        
        <canvas id="game-chart"></canvas>

        <div style="background: #1e293b; border: 1px solid var(--blue); padding: 8px; border-radius: 10px; margin-bottom: 10px; text-align: left;">
            <div style="color:var(--blue); font-size: 10px; font-weight:bold;">📰 今日新聞</div>
            <div id="news-text" style="font-size: 12px; color: #f8fafc; font-style: italic;">歡迎來到股市！</div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
            <div style="background:#334155; padding:8px; border-radius:10px;">現金: $<span id="display-cash">1000</span></div>
            <div style="background:#334155; padding:8px; border-radius:10px;">持股: <span id="display-shares">0</span></div>
        </div>

        <button class="btn-next" id="next-day-btn">⏩ 進入下一天</button>

        <div class="trade-panel">
            <button class="btn-buy" id="buy-1">買 1</button>
            <button class="btn-buy" id="buy-10">買 10</button>
            <button class="btn-buy" id="buy-all">全買</button>
            <button class="btn-sell" id="sell-1">賣 1</button>
            <button class="btn-sell" id="sell-10">賣 10</button>
            <button class="btn-sell" id="sell-all">全賣</button>
        </div>

        <div class="list-container">
            <div style="color:#64748b; margin-bottom:5px;">📋 交易日誌</div>
            <div id="log-list" class="log-list"></div>
        </div>

        <div class="list-container">
            <div style="color:#64748b; margin-bottom:5px;">🏆 財富排行</div>
            <div id="rank-list" class="log-list">載入中...</div>
        </div>

        <button class="btn-reset" id="reset-btn">重置個人遊戲數據</button>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, onSnapshot, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB8jlZ8rYpb6AQuqw5WQtYoRq2PKYMmXAU",
    authDomain: "mygame-5ef71.firebaseapp.com",
    projectId: "mygame-5ef71",
    storageBucket: "mygame-5ef71.appspot.com",
    messagingSenderId: "776634078002",
    appId: "1:776634078002:web:b9bd8e6ee9d8be52157d2b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let _s = { c: 1000, s: 0, d: 1, p: 100, lp: 100, h: [100], n: "", pw: "", ic: false };
  let _check = 1000;
  let uid = ""; 

  const newsLibrary = [
    { t: "科技巨頭發佈新款 AI 晶片，板塊全線大漲！", mul: [0.1, 0.25] },
    { t: "央行宣佈降息，市場資金湧入股市。", mul: [0.05, 0.15] },
    { t: "爆發全球性病毒危機，投資者恐慌拋售。", mul: [-0.15, -0.3] },
    { t: "今日市場平淡，投資者正在觀望。", mul: [-0.02, 0.02] },
    { t: "某上市公司被爆財務造假，股價跳水。", mul: [-0.1, -0.2] }
  ];

  document.getElementById('start-btn').onclick = async () => {
    const name = document.getElementById("username-input").value.trim();
    const pass = document.getElementById("password-input").value.trim();
    if (name.length < 2 || pass.length < 3) return alert("暱稱或密碼太短");

    try {
      // 1. 匿名登入獲取臨時身份
      const res = await signInAnonymously(auth);
      const tempUid = res.user.uid;

      // 2. 查找暱稱對應的舊資料
      const q = query(collection(db, "players"), where("name", "==", name));
      const snap = await getDocs(q);
      
      let foundData = null;
      let foundUid = "";
      snap.forEach(d => { if(d.data().name === name) { foundData = d.data(); foundUid = d.id; } });

      if (foundData) {
        if (foundData.pw !== pass) return alert("密碼錯誤！");
        uid = foundUid; // 繼承舊 UID
        _s = { ..._s, c: foundData.cash, s: foundData.shares, d: foundData.day, n: foundData.name, pw: foundData.pw, ic: foundData.isCheater };
      } else {
        uid = tempUid; // 新玩家使用新 UID
        _s.n = name; _s.pw = pass;
        await sync();
      }

      document.getElementById("auth-overlay").style.display = "none";
      _check = _s.c;
      startLeaderboard();
      refreshUI();
    } catch (e) { alert("連線失敗"); }
  };

  async function sync() {
    if (!uid) return;
    await setDoc(doc(db, "players", uid), {
      name: _s.n, pw: _s.pw, cash: _s.c, shares: _s.s, day: _s.d, 
      totalAsset: _s.c + (_s.s * _s.p), isCheater: _s.ic, lastUpdate: Date.now()
    }, { merge: true });
  }

  function handleTrade(type, mode) {
    const p = _s.p;
    let amt = 0;
    if (type === 'buy') {
      amt = (mode === 'all') ? Math.floor(_s.c / p) : mode;
      if (amt > 0 && _s.c >= amt * p) { _s.c -= amt * p; _s.s += amt; addLog(`買入 ${amt} 股 @ $${p.toFixed(2)}`, 'up'); }
    } else {
      amt = (mode === 'all') ? _s.s : mode;
      if (amt > 0 && _s.s >= amt) { _s.c += amt * p; _s.s -= amt; addLog(`賣出 ${amt} 股 @ $${p.toFixed(2)}`, 'down'); }
    }
    _check = _s.c; refreshUI(); sync();
  }

  document.getElementById('buy-1').onclick = () => handleTrade('buy', 1);
  document.getElementById('buy-10').onclick = () => handleTrade('buy', 10);
  document.getElementById('buy-all').onclick = () => handleTrade('buy', 'all');
  document.getElementById('sell-1').onclick = () => handleTrade('sell', 1);
  document.getElementById('sell-10').onclick = () => handleTrade('sell', 10);
  document.getElementById('sell-all').onclick = () => handleTrade('sell', 'all');

  document.getElementById('next-day-btn').onclick = () => {
    _s.d++; _s.lp = _s.p;
    const news = newsLibrary[Math.floor(Math.random() * newsLibrary.length)];
    document.getElementById('news-text').innerText = news.t;
    const effect = Math.random() * (news.mul[1] - news.mul[0]) + news.mul[0];
    _s.p *= (1 + effect); if (_s.p < 5) _s.p = 5;
    _s.h.push(_s.p); if (_s.h.length > 20) _s.h.shift();
    refreshUI(); sync();
  };

  document.getElementById('reset-btn').onclick = async () => {
    if(confirm("確定重置數據？")){ _s.c=1000;_s.s=0;_s.d=1;_s.p=100;_s.h=[100]; refreshUI(); await sync(); }
  };

  function addLog(msg, clr) {
    const log = document.getElementById("log-list");
    const div = document.createElement("div");
    div.innerHTML = `<span style="color:#64748b">[D${_s.d}]</span> <span class="${clr}">${msg}</span>`;
    log.prepend(div);
  }

  function startLeaderboard() {
    onSnapshot(query(collection(db, "players"), orderBy("totalAsset", "desc"), limit(5)), (snap) => {
      let h = "";
      snap.forEach(d => {
        const p = d.data();
        h += `<div style="display:flex; justify-content:space-between;"><span>${p.name}${p.isCheater ? '🚫' : ''}</span><b>$${Math.floor(p.totalAsset).toLocaleString()}</b></div>`;
      });
      document.getElementById("rank-list").innerHTML = h;
    });
  }

  function refreshUI() {
    document.getElementById("display-cash").innerText = Math.floor(_s.c).toLocaleString();
    document.getElementById("display-shares").innerText = _s.s;
    document.getElementById("display-day").innerText = _s.d;
    document.getElementById("stock-price").innerText = "$" + _s.p.toFixed(2);
    const diff = ((_s.p - _s.lp) / _s.lp * 100).toFixed(2);
    const pEl = document.getElementById("stock-percent");
    pEl.innerText = (diff >= 0 ? "+" : "") + diff + "%";
    pEl.className = diff >= 0 ? "up" : "down";
    document.getElementById("player-display").innerText = "玩家: " + _s.n + (_s.ic ? " (異常)" : "");
    drawChart();
  }

  function drawChart() {
    const c = document.getElementById("game-chart");
    const t = c.getContext("2d");
    c.width = c.offsetWidth; c.height = c.offsetHeight;
    t.clearRect(0,0,c.width,c.height);
    t.beginPath(); t.strokeStyle = (_s.p >= _s.lp) ? "#22c55e" : "#ef4444"; t.lineWidth = 2;
    _s.h.forEach((v, i) => {
      const x = (i / (_s.h.length - 1 || 1)) * c.width;
      const y = c.height - (v / (Math.max(..._s.h, 1) * 1.2)) * c.height;
      if(i===0) t.moveTo(x,y); else t.lineTo(x,y);
    });
    t.stroke();
  }
</script>
</body>
</html>
