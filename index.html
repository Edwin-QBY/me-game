<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資模擬器 - 聯網修正版</title>

    <!-- 1. 修正：使用完整的 Firebase 官方連結 -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --up: #22c55e; --down: #ef4444; --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; max-width: 300px; border: 2px solid var(--blue); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; font-size: 16px; background: #0a101e; color: white; box-sizing: border-box; }
        canvas { width: 100%; height: 150px; background: #000; border-radius: 12px; margin: 10px 0; border: 1px solid #334155; }
        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.1s; padding: 12px; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .btn-next { width: 100%; padding: 15px; background: var(--blue); color: #0f172a; font-size: 18px; margin-bottom: 10px; }
        .btn-buy { background: var(--up); width: 100%; }
        .btn-sell { background: var(--down); width: 100%; }
        .up { color: var(--up); } .down { color: var(--down); }
        #rank-list { text-align: left; font-size: 13px; background: #0a101e; padding: 10px; border-radius: 10px; margin-top: 10px; min-height: 100px; }
        .rank-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="color:var(--blue);">🎮 市場連線中</h2>
            <input type="text" id="username-input" placeholder="輸入暱稱...">
            <button class="btn-next" onclick="login()">開始遊戲</button>
            <div id="status-msg" style="font-size: 12px; color: #94a3b8; margin-top: 10px;">正在讀取數據...</div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8;">
            <span>玩家: <b id="p-name">---</b></span>
            <span>DAY <b id="display-day">1</b></span>
        </div>
        <div style="font-size: 32px; font-weight: bold; margin: 10px 0;">
            $<span id="stock-price">100.00</span>
            <small id="stock-percent" style="font-size: 16px;">+0.00%</small>
        </div>
        <canvas id="game-chart"></canvas>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <div style="background: #334155; padding: 10px; border-radius: 10px;">現金: $<span id="display-cash">1000</span></div>
            <div style="background: #334155; padding: 10px; border-radius: 10px;">持股: <span id="display-shares">0</span></div>
        </div>
        <button class="btn-next" onclick="nextDay()">⏩ 進入下一天</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-buy" onclick="trade('buy')">全倉買入</button>
            <button class="btn-sell" onclick="trade('sell')">全倉賣出</button>
        </div>
        <div id="rank-list">排行榜載入中...</div>
    </div>

<script>
    // --- 1. 配置 (修正後的正確配置) ---
    const firebaseConfig = {
        apiKey: "AIzaSyB8jlZ8rYpb6AQuqw5WQtYoRq2PKYMmXAU",
        authDomain: "mygame-5ef71.firebaseapp.com",
        projectId: "mygame-5ef71",
        storageBucket: "mygame-5ef71.firebasestorage.app",
        messagingSenderId: "776634078002",
        appId: "1:776634078002:web:b9bd8e6ee9d8be52157d2b"
    };

    var db = null;
    var g = { name: "", cash: 1000, shares: 0, day: 1, price: 100, lastPrice: 100, history: [100] };

    // --- 2. 初始化 ---
    function initFirebase() {
        try {
            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log("Firebase OK");
            }
        } catch (e) { console.error(e); }
    }

    window.login = async function() {
        const nameInput = document.getElementById('username-input').value.trim();
        if (nameInput.length < 2) return alert("暱稱太短");
        g.name = nameInput;

        if (db) {
            try {
                const doc = await db.collection("players").doc(g.name).get();
                if (doc.exists) g = Object.assign(g, doc.data());
                else await syncCloud();
                startLeaderboard();
            } catch (e) { console.log("雲端連線失敗", e); }
        }

        document.getElementById('auth-overlay').style.display = "none";
        document.getElementById('p-name').innerText = g.name;
        refreshUI();
    };

    async function syncCloud() {
        if (db && g.name) {
            try {
                const total = g.cash + (g.shares * g.price);
                await db.collection("players").doc(g.name).set({
                    ...g, totalAsset: total, lastUpdate: Date.now()
                });
            } catch (e) { console.error(e); }
        }
    }

    function startLeaderboard() {
        if (!db) return;
        db.collection("players").orderBy("totalAsset", "desc").limit(8)
          .onSnapshot((snap) => {
            if (snap.empty) {
                document.getElementById('rank-list').innerHTML = "目前尚無數據，快來搶佔第一名！";
                return;
            }
            let html = "🏆 全服財富榜：<br>";
            snap.forEach(d => {
                const data = d.data();
                html += `<div class="rank-item"><span>${data.name}</span><b class="up">$${Math.floor(data.totalAsset || 0)}</b></div>`;
            });
            document.getElementById('rank-list').innerHTML = html;
        }, (err) => {
            document.getElementById('rank-list').innerHTML = "排行榜載入失敗，請確認 Firebase 規則";
        });
    }

    window.nextDay = function() {
        g.day++; g.lastPrice = g.price;
        g.price *= (1 + (Math.random() * 0.28 - 0.14) + (100 - g.price) * 0.08 / 100);
        if (g.price < 5) g.price = 5;
        g.history.push(g.price);
        if (g.history.length > 20) g.history.shift();
        refreshUI();
        syncCloud();
    };

    window.trade = function(type) {
        let qty = (type === 'buy') ? Math.floor(g.cash / g.price) : g.shares;
        if (qty > 0) {
            if (type === 'buy') { g.cash -= qty * g.price; g.shares += qty; }
            else { g.cash += qty * g.price; g.shares -= qty; }
        }
        refreshUI();
        syncCloud();
    };

    function refreshUI() {
        document.getElementById('stock-price').innerText = g.price.toFixed(2);
        document.getElementById('display-cash').innerText = Math.floor(g.cash);
        document.getElementById('display-shares').innerText = g.shares;
        document.getElementById('display-day').innerText = g.day;
        const diff = ((g.price - g.lastPrice) / g.lastPrice * 100);
        const pEl = document.getElementById('stock-percent');
        pEl.innerText = (diff >= 0 ? "+" : "") + diff.toFixed(2) + "%";
        pEl.style.color = diff >= 0 ? "#22c55e" : "#ef4444";
        drawChart(diff >= 0);
    }

    function drawChart(isUp) {
        const canvas = document.getElementById('game-chart');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        const pad = 20; const max = Math.max(...g.history) * 1.1; const min = Math.min(...g.history) * 0.9;
        const range = (max - min) || 1;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.beginPath(); ctx.strokeStyle = isUp ? "#22c55e" : "#ef4444"; ctx.lineWidth = 3;
        g.history.forEach((p, i) => {
            const x = (i / (g.history.length - 1)) * (canvas.width - pad * 2) + pad;
            const y = canvas.height - ((p - min) / range * (canvas.height - pad * 2) + pad);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    initFirebase();
</script>
</body>
</html>
